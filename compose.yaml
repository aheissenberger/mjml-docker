services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_KEY: ${API_KEY:?API_KEY is required}
      PORT: ${PORT:-3000}
      RENDER_WORKERS: ${RENDER_WORKERS:-2}
      RENDER_QUEUE_SIZE: ${RENDER_QUEUE_SIZE:-64}
      RENDER_TIMEOUT_MS: ${RENDER_TIMEOUT_MS:-20000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-120}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
    ports:
      - "${PORT:-3000}:${PORT:-3000}"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:${PORT:-3000}/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
