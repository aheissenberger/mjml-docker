services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      API_KEY: ${API_KEY:?API_KEY is required}
      PORT: 3000
    ports:
      - "3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/health').then((res)=>{if(!res.ok)process.exit(1)}).catch(()=>process.exit(1))",
        ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    restart: unless-stopped
